name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Godot 4.6
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          sudo mv Godot_v4.6-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Install Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable
          wget -q "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.6.stable/

      - name: Write editor settings
        run: |
          SDK="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          mkdir -p ~/.config/godot
          printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\nexport/android/android_sdk_path = "%s"\n' "$SDK" > ~/.config/godot/editor_settings-4.tres
          cat ~/.config/godot/editor_settings-4.tres

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore "$HOME/debug.keystore" -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"

      - name: Write export presets
        run: |
          mkdir -p build
          printf '[preset.0]\n\nname="Android"\nplatform="Android"\nrunnable=true\ndedicated_server=false\ncustom_features=""\nexport_filter="all_resources"\nexport_path="build/SupermarketSimulator.apk"\nencrypt_pck=false\nencrypt_directory=false\n\n[preset.0.options]\n\ngradle_build/use_gradle_build=false\narchitectures/armeabi-v7a=false\narchitectures/arm64-v8a=true\narchitectures/x86=false\narchitectures/x86_64=false\nkeystore/debug=""\nkeystore/debug_user=""\nkeystore/debug_password=""\npackage/unique_name="com.game.supermarket3d"\npackage/name="Supermarket Simulator 3D"\npackage/signed=false\npackage/classify_as_game=true\npackage/retain_data_on_uninstall=false\npackage/exclude_from_recents=false\npackage/show_as_launcher_icon=true\nversion/code=1\nversion/name="1.0"\norientation/screen_orientation=0\nscreen/immersive_mode=true\nscreen/support_small=true\nscreen/support_normal=true\nscreen/support_large=true\nscreen/support_xlarge=true\n' > export_presets.cfg
          cat export_presets.cfg

      - name: Export APK
        run: |
          mkdir -p build
          godot --headless --export-debug "Android" "build/SupermarketSimulator.apk" || true
          ls -la build/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SupermarketSimulator-APK
          path: build/SupermarketSimulator.apk
          if-no-files-found: error
          retention-days: 30
